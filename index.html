<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مركز قيادة الرائد - Komondose</title>
<style>
    body { background:#000; color:#0f0; font-family:monospace; padding:5px; margin:0; }
    .card { border:2px solid #0f0; background:#050505; padding:10px; border-radius:15px; margin-bottom:5px; box-shadow:0 0 15px #030; }
    textarea, input { width:100%; background:#000; border:1px solid #0f0; color:#fff; padding:12px; margin:8px 0; border-radius:8px; box-sizing:border-box; font-size:1.1rem; }
    .btn { width:100%; padding:12px; border:none; font-weight:bold; cursor:pointer; border-radius:10px; margin:5px 0; font-size:1rem; transition:0.3s; }
    .btn-blue { background:#1f6feb; color:#fff; }
    .btn-green { background:#238636; color:#fff; box-shadow:0 0 10px #0f0; }
    .mode-box { display:flex; gap:10px; margin:10px 0; }
    .m-btn { flex:1; background:none; border:2px solid #0f0; color:#0f0; padding:5px; border-radius:10px; }
    .active { background:#0f0 !important; color:#000 !important; }
</style></head>
<body>
    <div class="card">
        <h2 style="text-align:center; color:#0f0;">📡 مركز قيادة الرائد 🛰️</h2>
        <textarea id="raw" rows="3" placeholder="احقن التعليقات هنا..."></textarea>
        <button class="btn btn-blue" onclick="inj()">⚡ استخراج وحقن سيبراني</button>
    </div>
    <div class="card">
        <textarea id="list" rows="4" placeholder="الأسماء الجاهزة..."></textarea>
        <input type="text" id="target" placeholder="الفائز المبرمج...">
        <div class="mode-box">
            <button id="m_auto" class="m-btn" onclick="setM('auto')">🟢 تلقائي</button>
            <button id="m_forced" class="m-btn active" onclick="setM('forced')">🔴 مبرمج</button>
        </div>
        <button class="btn btn-green" onclick="save()">✅ حفظ ورفع للماتريكس</button>
<button class="btn" style="background:#da3633; color:#fff;" onclick="clearAll()">🗑️ المسح الكلي للأسماء</button>
    </div>
    <button class="btn" style="background:#0f0; color:#000; font-size:1.5rem;" onclick="location.href='public.html'">🚀 فتح الماتريكس</button>
<script>
window.onload = function() { const d = JSON.parse(localStorage.getItem("komondose_v22")); if(d) { document.getElementById("list").value = d.names.join(", "); document.getElementById("target").value = d.target; setM(d.mode); } };
let m = 'forced';
function inj(){
    const t=document.getElementById('raw').value;
    const f=t.match(/([a-zA-Z0-9أ-ي_]+)/g)||[];
    const u=[...new Set(f.filter(n=>n.length>2))];
    document.getElementById('list').value=u.join(', ');
}
function setM(mode){ m=mode; document.getElementById('m_auto').className=(mode=='auto'?'m-btn active':'m-btn'); document.getElementById('m_forced').className=(mode=='forced'?'m-btn active':'m-btn'); }
function save(){
    const d={names:document.getElementById('list').value.split(','), target:document.getElementById('target').value, mode:m};
    localStorage.setItem('komondose_v22', JSON.stringify(d));
    alert("تم تأمين البيانات بنجاح يا قائد!");
}
function clearAll() { if(confirm("هل تريد مسح جميع الأسماء والبيانات؟")) { localStorage.removeItem("komondose_v22"); document.getElementById("raw").value=""; document.getElementById("list").value=""; document.getElementById("target").value=""; alert("تم تصفير الذاكرة بنجاح."); } }
</script></body></html>
