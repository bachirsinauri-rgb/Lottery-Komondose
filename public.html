<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { margin:0; background:#000; overflow:hidden; font-family:monospace; }
    canvas { position:fixed; top:0; left:0; opacity:0.3; }
    .ui { position:relative; z-index:10; height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; }
    .scanner { width:95%; height:100px; border:4px solid #0f0; background:rgba(0,30,0,0.9); overflow:hidden; position:relative; border-radius:20px; box-shadow:0 0 50px #0f0; }
    #scroll { display:flex; white-space:nowrap; position:absolute; font-size:4rem; color:#fff; font-weight:bold; height:100%; align-items:center; }
    .stop-btn { width:85%; padding:35px; background:linear-gradient(to bottom, #ff0000, #880000); color:#fff; font-size:2.8rem; border-radius:30px; margin-top:40px; cursor:pointer; font-weight:bold; border:4px solid #fff; box-shadow:0 0 40px #f00; }
    #overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); display:none; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
</style></head>
<body>
    <canvas id="c"></canvas>
    <div class="ui"><div class="scanner"><div id="scroll"></div></div><button class="stop-btn" onclick="stop()">STOP 🛑</button></div>
    <div id="overlay"><div style="border:5px solid #0f0; padding:60px; border-radius:40px; text-align:center; background:#000; box-shadow: 0 0 30px #0f0, inset 0 0 15px #0f0;">
        <div style="color:#0f0; font-size:2rem; margin-bottom:20px;">✧ الفائز الرائد ✧</div>
        <div id="winner" style="font-size:3.5rem; color:#fff; text-shadow: 0 0 20px #0f0, 0 0 40px #fff; font-weight:900;"></div>
        <button onclick="location.reload()" style="margin-top:40px; padding:15px 40px; background:#0f0; color:#000; border:none; border-radius:10px; font-weight:bold;">إعادة سحب 🌀</button>
    </div></div>
<script>
let db=JSON.parse(localStorage.getItem('komondose_v22'))||{names:["تأكد من الحفظ"],target:"",mode:"forced"}, spin=true, x=0;
const sc=document.getElementById('scroll');
for(let i=0; i<80; i++){ db.names.forEach(n=>{if(n.trim()){const s=document.createElement('span'); s.style.padding='0 90px'; s.innerText=n; sc.appendChild(s);}});}
function move(){ if(spin){ x-=12; sc.style.transform=`translateX(${x}px)`; if(Math.abs(x)>sc.scrollWidth/2)x=0; requestAnimationFrame(move);}} move();
function stop(){ 
    spin=false; 
    const res=(db.mode=='forced' && db.target)?db.target : db.names[Math.floor(Math.random()*db.names.length)];
    document.getElementById('winner').innerText=res;
    document.getElementById('overlay').style.display='flex';
}
const canv=document.getElementById('c'); const ctx=canv.getContext('2d'); canv.width=window.innerWidth; canv.height=window.innerHeight;
let d=Array(Math.floor(canv.width/20)).fill(1);
function draw(){ ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.fillRect(0,0,canv.width,canv.height); ctx.fillStyle='#39ff14'; d.forEach((y,i)=>{ctx.fillText("10",i*20,y*20);if(y*20>canv.height&&Math.random()>0.975)d[i]=0;d[i]++;});} setInterval(draw,50);
</script></body></html>
