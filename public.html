<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Matrix - Komondose</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { position: absolute; top: 0; left: 0; z-index: 1; }
        
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2;
        }

        /* شريط الأسماء بمقاس 1.2cm ارتفاع و 4cm طول تقريباً */
        .slot-machine {
            width: 150px; height: 45px; /* مقاييس متوازنة للهاتف والكمبيوتر */
            border: 2px solid #39ff14; background: rgba(0, 20, 0, 0.8);
            border-radius: 8px; overflow: hidden; position: relative;
            box-shadow: 0 0 15px #0f0; display: flex; align-items: center; justify-content: center;
        }

        .name-strip {
            position: absolute; width: 100%; text-align: center;
            font-size: 1.2rem; color: #fff; font-weight: bold;
            text-shadow: 0 0 10px #0f0; transition: transform 0.1s linear;
        }

        /* زر اختيار الفائز بمقاس 1.2cm ارتفاع و 2cm طول */
        .action-btn {
            margin-top: 20px; width: 80px; height: 45px;
            background: #ff0000; color: white; border: 2px solid #fff;
            border-radius: 10px; font-weight: bold; cursor: pointer;
            box-shadow: 0 0 15px #f00; font-size: 0.9rem;
        }

        /* واجهة الفائز المزدهرة */
        #winner-screen {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 100; flex-direction: column; align-items: center; justify-content: center;
        }
        .win-box {
            padding: 40px; border: 3px solid #0f0; border-radius: 20px;
            text-align: center; box-shadow: 0 0 50px #0f0; animation: glow 1s infinite alternate;
        }
        @keyframes glow { from { box-shadow: 0 0 20px #0f0; } to { box-shadow: 0 0 60px #39ff14; } }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div id="ui-layer">
        <div class="slot-machine">
            <div id="strip" class="name-strip">جاري الجلب...</div>
        </div>
        <button id="drawBtn" class="action-btn">إختيار الفائز</button>
    </div>

    <div id="winner-screen">
        <div class="win-box">
            <h2 style="color:#39ff14;">✨ الفائز الرائد ✨</h2>
            <h1 id="final-name" style="color:#fff; font-size: 3rem; text-shadow: 0 0 20px #0f0;"></h1>
            <button onclick="location.reload()" style="margin-top:20px; padding:10px 30px; background:#0f0; border:none; border-radius:5px; font-weight:bold;">إعادة سحب 🌀</button>
        </div>
    </div>

    <script>
        // 1. شلال الماتريكس الساطع
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const col = canvas.width / 20; const drops = Array(Math.floor(col)).fill(1);
        function drawM() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff41"; ctx.font = "20px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i*20, y*20);
                if(y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawM, 40);

        // 2. استقطاب الأسماء والربط
        const storage = JSON.parse(localStorage.getItem("komondose_v22")) || {names:["الرائد"], mode:"auto", target:""};
        const names = storage.names;
        let idx = 0; let y = -50;
        const strip = document.getElementById("strip");

        function spin() {
            y += 35; // سرعة النزول من الأفق
            if(y > 50) {
                y = -50; idx = (idx + 1) % names.length;
                strip.innerText = `✨ ${names[idx]} ✨`;
            }
            strip.style.transform = `translateY(${y}px)`;
        }
        let spinInt = setInterval(spin, 30);

        // 3. منطق الاختيار (وميض وبروز)
        document.getElementById("drawBtn").onclick = function() { 
    clearInterval(spinInt); 
    strip.style.display = "none"; 
    const flash = document.createElement("div"); 
    flash.style = "position:absolute; inset:0; background:white; z-index:99; animation: flashOut 0.3s forwards;"; 
    document.querySelector(".slot-machine").appendChild(flash); 
    
    
    @keyframes flashOut { from { opacity: 1; } to { opacity: 0; } }
            clearInterval(spinInt);
            strip.style.color = "#ffff00"; // وميض أصفر
            strip.style.fontSize = "1.5rem";
            
            // تحديد الفائز بناءً على اختيارك في واجهة التحكم
            let winner = (storage.mode === "forced" && storage.target) ? storage.target : strip.innerText.replace(/✨/g, "").trim();
            
            setTimeout(() => { flash.remove(); 
                document.getElementById("final-name").innerText = winner;
                document.getElementById("winner-screen").style.display = "flex";
            }, 800);
        };
    </script>
</body>
</html>
